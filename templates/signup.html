{% extends "base.html" %}
{% block title %}Sign Up - stackeducation{% endblock %}

{% block content %}
<section class="min-h-screen pt-32 pb-20 flex items-center justify-center bg-background-dark relative overflow-hidden">
    <div class="absolute top-[-20%] right-[20%] w-[600px] h-[600px] bg-primary/20 rounded-full blur-[150px] pointer-events-none"></div>

    <div class="w-full max-w-md mx-auto px-6 relative z-10">
        <div class="glass-card p-8 border border-white/10">
            <div class="text-center mb-8">
                <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-full bg-primary/10 mb-4">
                    <span class="material-symbols-outlined text-primary text-2xl">person_add</span>
                </div>
                <h1 class="text-2xl font-bold font-display text-white">Create your account</h1>
                <p class="text-sm text-gray-500 mt-2">Join the builder-first ecosystem.</p>
            </div>

            {% if error %}
            <div class="mb-5 flex items-center gap-2 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-400">
                <span class="material-symbols-outlined text-base">error</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="" class="space-y-5">
                <div>
                    <label for="name" class="block text-sm font-bold mb-1 text-gray-300">Full Name</label>
                    <input type="text" id="name" name="name" required autocomplete="name"
                        class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 text-white transition-all">
                </div>

                <div>
                    <label for="email" class="block text-sm font-bold mb-1 text-gray-300">Email Address</label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                        class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 text-white transition-all">
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold mb-1 text-gray-300">Password</label>
                    <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password"
                        class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 text-white transition-all">
                </div>

                <button type="submit"
                    class="w-full bg-primary text-white font-bold py-3.5 rounded-xl hover:bg-primary/90 transition-all shadow-lg shadow-primary/25">
                    Create Account
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Already have an account?
                <a href="{{ url_for('login', next=request.args.get('next')) if request.args.get('next') else url_for('login') }}"
                    class="text-primary hover:text-white transition-colors font-medium">Log in</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
