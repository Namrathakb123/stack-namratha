<!-- AI Chatbot Component -->
<div id="ai-chatbot" class="fixed bottom-6 right-6 z-[9999] flex flex-col items-end">
    <!-- Chat Window (Initially Hidden) -->
    <div id="chat-window" class="hidden w-[350px] sm:w-[400px] h-[500px] bg-background-dark/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl flex flex-col overflow-hidden mb-4 transform transition-all duration-300 origin-bottom-right scale-95 opacity-0">
        <!-- Chat Header -->
        <div class="p-4 border-bottom border-white/10 bg-primary/10 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-white/10 p-1 flex items-center justify-center overflow-hidden border border-white/20">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Stack Logo" class="w-full h-full object-contain">
                </div>
                <div>
                    <h4 class="text-white font-bold text-sm">Stack AI</h4>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[10px] text-gray-400 font-medium">Online</span>
                    </div>
                </div>
            </div>
            <button id="close-chat" class="text-gray-400 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-xl">close</span>
            </button>
        </div>

        <!-- Chat Messages -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
            <!-- Welcome Message -->
            <div class="flex items-start gap-2.5">
                <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center flex-shrink-0">
                    <span class="material-symbols-outlined text-primary text-sm">smart_toy</span>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-2xl rounded-tl-none p-3 max-w-[80%]">
                    <p class="text-sm text-gray-200">Hi! I'm Stack AI. How can I help you today? I can answer questions about our courses, internships, and build services.</p>
                </div>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="p-4 border-t border-white/10 bg-white/5 flex flex-col gap-2">
            <div class="flex items-center justify-between px-2">
                <button type="button" id="tts-toggle" class="text-xs flex items-center gap-1 text-gray-400 hover:text-white transition-colors focus:outline-none">
                    <span class="material-symbols-outlined text-[16px]" id="tts-icon">volume_off</span>
                    <span id="tts-label">Voice Off</span>
                </button>
            </div>
            <form id="chat-form" class="flex items-center gap-2">
                <button type="button" id="stt-btn" class="w-10 h-10 rounded-xl bg-white/5 text-gray-400 flex items-center justify-center hover:bg-white/10 hover:text-white transition-all focus:outline-none" title="Click to speak">
                    <span class="material-symbols-outlined text-sm" id="stt-icon">mic</span>
                </button>
                <input type="text" id="chat-input" placeholder="Type or speak your message..." 
                    class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:ring-1 focus:ring-primary/50 transition-all">
                <button type="submit" class="w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center hover:bg-primary/90 transition-all shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-sm">send</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Chat Toggle Button -->
    <button id="chat-toggle" class="group flex items-center gap-3 bg-[#111113]/90 backdrop-blur-md border border-white/10 rounded-full p-2 pr-6 hover:bg-[#1a1a1c] transition-all shadow-2xl">
        <div class="w-10 h-10 rounded-full bg-white p-1 flex items-center justify-center overflow-hidden shadow-lg group-hover:scale-105 transition-transform">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="w-8 h-8 object-contain">
        </div>
        <span class="text-white font-bold text-sm">How can we help you?</span>
    </button>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
    }

    #chat-window.active {
        display: flex;
        animation: chatOpen 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes chatOpen {
        from {
            transform: scale(0.9) translateY(20px);
            opacity: 0;
        }
        to {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const chatToggle = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const closeChat = document.getElementById('close-chat');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        const toggleChat = () => {
            chatWindow.classList.toggle('hidden');
            chatWindow.classList.toggle('active');
            if (chatWindow.classList.contains('active')) {
                chatInput.focus();
            }
        };

        chatToggle.addEventListener('click', toggleChat);
        closeChat.addEventListener('click', toggleChat);

        const formatMessage = (text) => {
            // Simple markdown link parser [text](url)
            return text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" class="text-primary hover:underline" target="_blank">$1</a>');
        };

        const addMessage = (text, isUser = false) => {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex items-start gap-2.5 ${isUser ? 'flex-row-reverse' : ''}`;
            
            const icon = isUser ? 'person' : 'smart_toy';
            const bgClass = isUser ? 'bg-primary' : 'bg-primary/20';
            const textBgClass = isUser ? 'bg-primary text-white' : 'bg-white/5 border border-white/10 text-gray-200';
            const roundedClass = isUser ? 'rounded-tr-none' : 'rounded-tl-none';

            messageDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full ${bgClass} flex items-center justify-center flex-shrink-0">
                    <span class="material-symbols-outlined ${isUser ? 'text-white' : 'text-primary'} text-sm">${icon}</span>
                </div>
                <div class="${textBgClass} rounded-2xl ${roundedClass} p-3 max-w-[80%]">
                    <p class="text-sm">${isUser ? text : formatMessage(text)}</p>
                </div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };

        // TTS Logic
        let isTTSActive = false;
        const ttsToggle = document.getElementById('tts-toggle');
        const ttsIcon = document.getElementById('tts-icon');
        const ttsLabel = document.getElementById('tts-label');

        ttsToggle.addEventListener('click', () => {
            isTTSActive = !isTTSActive;
            if (isTTSActive) {
                ttsIcon.textContent = 'volume_up';
                ttsIcon.classList.add('text-primary');
                ttsLabel.textContent = 'Voice On';
                ttsLabel.classList.add('text-primary');
            } else {
                ttsIcon.textContent = 'volume_off';
                ttsIcon.classList.remove('text-primary');
                ttsLabel.textContent = 'Voice Off';
                ttsLabel.classList.remove('text-primary');
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            }
        });

        const speakText = (text) => {
            if (!isTTSActive || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); // Stop any ongoing speech
            
            // Remove markdown syntax for speech
            const cleanText = text.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1').replace(/\*/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes('Google') && v.lang.includes('en')) || 
                                   voices.find(v => v.lang.includes('en-US'));
            if (preferredVoice) utterance.voice = preferredVoice;
            
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        };

        // STT Logic
        const sttBtn = document.getElementById('stt-btn');
        const sttIcon = document.getElementById('stt-icon');
        let recognition = null;
        let isListening = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                sttBtn.classList.add('bg-red-500/20', 'text-red-500');
                sttBtn.classList.remove('bg-white/5', 'text-gray-400');
                sttIcon.classList.add('animate-pulse');
                chatInput.placeholder = "Listening...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                chatInput.value = transcript;
                // Auto-submit after voice input
                chatForm.dispatchEvent(new Event('submit'));
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                stopListening();
            };

            recognition.onend = () => {
                stopListening();
            };
        } else {
            sttBtn.style.display = 'none'; // Hide if unsupported
        }

        const stopListening = () => {
            isListening = false;
            sttBtn.classList.remove('bg-red-500/20', 'text-red-500');
            sttBtn.classList.add('bg-white/5', 'text-gray-400');
            sttIcon.classList.remove('animate-pulse');
            chatInput.placeholder = "Type or speak your message...";
        };

        sttBtn.addEventListener('click', () => {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
            } else {
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                recognition.start();
            }
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, true);
            chatInput.value = '';

            // Add loading state
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'flex items-start gap-2.5 animate-pulse';
            loadingDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center flex-shrink-0">
                    <span class="material-symbols-outlined text-primary text-sm">smart_toy</span>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-2xl rounded-tl-none p-3">
                    <div class="flex gap-1">
                        <span class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce"></span>
                        <span class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                        <span class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                    </div>
                </div>
            `;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message }),
                });

                const data = await response.json();
                loadingDiv.remove();

                if (data.status === 'success') {
                    addMessage(data.response);
                    speakText(data.response);
                } else {
                    const errorMsg = "Sorry, I'm having some trouble connecting right now. " + (data.message || "Please try again later.");
                    addMessage(errorMsg);
                    speakText(errorMsg);
                }
            } catch (error) {
                loadingDiv.remove();
                const catchMsg = "Sorry, something went wrong. Please check your connection.";
                addMessage(catchMsg);
                speakText(catchMsg);
            }
        });
    });
</script>
