{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<section class="min-h-screen pt-32 pb-20 flex items-center justify-center hero-bg relative overflow-hidden">
    <!-- Background Elements -->
    <div class="absolute top-[20%] left-[20%] w-[300px] h-[300px] bg-primary/20 rounded-full blur-[100px] animate-pulse"></div>
    <div class="absolute bottom-[20%] right-[20%] w-[400px] h-[400px] bg-blue-600/10 rounded-full blur-[100px]"></div>

    <div class="max-w-md w-full px-6 relative z-10" data-aos="fade-up">
        <div class="bg-white/5 border border-white/10 p-8 rounded-3xl backdrop-blur-md">
            <div class="text-center mb-8">
                <div class="h-16 w-16 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-4 text-primary">
                    <span class="material-symbols-outlined text-3xl">admin_panel_settings</span>
                </div>
                <h1 class="text-3xl font-black text-white">Admin Access</h1>
            </div>

            <form action="{{ url_for('admin') }}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                    <input type="password" name="admin_password" required
                        class="w-full bg-background-dark/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors text-center text-xl tracking-[0.5em]">
                </div>

                <button type="submit" class="w-full bg-primary text-white font-bold py-4 rounded-xl hover:bg-primary/90 transition-all shadow-lg shadow-primary/25">
                    Login
                </button>
            </form>
            <div class="text-center mt-6">
                <a href="/" class="text-gray-500 hover:text-white transition-colors text-sm">Return Home</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
