<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ url_for('favicon') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
    <link rel="icon" type="image/png" sizes="48x48" href="{{ url_for('static', filename='favicon-48.png') }}">
    <link rel="icon" type="image/png" sizes="96x96" href="{{ url_for('static', filename='favicon-96.png') }}">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='favicon-192.png') }}">
    <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='favicon-512.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">

    <!-- Primary Meta Tags -->
    <title>{% block title %}stackeducation - Master industry skills. Build. Pro.{% endblock %}</title>
    <meta name="title" content="stackeducation - Learn. Build. Pro.">
    <meta name="description"
        content="stackeducation is a builder-first ecosystem combining intensive learning, real-world internships (StackLabs), and professional product building (StackBuild). Master industry skills, gain experience, and transform your career.">
    <meta name="keywords"
        content="stackeducation, StackLabs, StackBuild, internships, coding, web development, software engineering, student programs, real-world projects, learn to code, tech career">
    <meta name="author" content="stackeducation">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#8b5cf6">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stackeducation.in/">
    <meta property="og:title" content="stackeducation - Learn. Build. Pro.">
    <meta property="og:description"
        content="Join the builder-first ecosystem. Master industry skills, gain real internship experience, and build products for companies.">
    <meta property="og:image" content="{{ url_for('static', filename='og-image.png') }}">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://stackeducation.in/">
    <meta property="twitter:title" content="stackeducation - Learn. Build. Pro.">
    <meta property="twitter:description"
        content="Join the builder-first ecosystem. Master industry skills, gain real internship experience, and build products for companies.">
    <meta property="twitter:image" content="{{ url_for('static', filename='og-image.png') }}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- NProgress for page loading -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>

    <!-- Dark Mode Init - Always Dark -->
    <script>
        document.documentElement.classList.add('dark');
        localStorage.theme = 'dark';
    </script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8b5cf6", /* Violet-500 - more vibrant */
                        "background-light": "#FAFAFA",
                        "background-dark": "#0a0a0c", /* Deep dark */
                        "text-main": "#181818",
                        "text-muted": "#71717a",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                    }
                },
            }
        }
    </script>

    <!-- Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-nav {
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }


        /* Antigravity Hero Background */
        .hero-bg {
            background-color: #0a0a0c;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            position: relative;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
        }

        /* Roadmap Timeline */
        .roadmap-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, transparent, #8b5cf6, transparent);
            transform: translateX(-50%);
        }

        @media (max-width: 768px) {
            .roadmap-line {
                left: 24px;
            }
        }

        /* Toast Styles */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 50;
        }

        .toast {
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            margin-bottom: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-success {
            /* Styles handled by tailwind in JS now */
            background-color: transparent;
        }

        .toast-error {
            /* Styles handled by tailwind in JS now */
            background-color: transparent;
        }

        /* Custom Animations */
        @keyframes float-slow {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(20px, -20px);
            }
        }

        @keyframes float-medium {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-15px, 15px);
            }
        }

        @keyframes float-fast {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(10px, 10px);
            }
        }

        @keyframes gradient-x {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .animate-float-slow {
            animation: float-slow 8s infinite ease-in-out;
            will-change: transform;
        }

        .animate-float-medium {
            animation: float-medium 6s infinite ease-in-out;
            will-change: transform;
        }

        .animate-float-fast {
            animation: float-fast 4s infinite ease-in-out;
            will-change: transform;
        }

        .animate-gradient-x {
            background-size: 200% 200%;
            animation: gradient-x 15s ease infinite;
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        /* Premium UI Enhancements */
        ::selection {
            background: #8b5cf6;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .premium-border {
            position: relative;
        }

        .premium-border::after {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), transparent, rgba(139, 92, 246, 0.3));
            border-radius: inherit;
            z-index: -1;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
        }

        /* Ambient Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
            will-change: transform, opacity;
        }

        .orb-1 { width: 400px; height: 400px; background: rgba(139, 92, 246, 0.15); top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(59, 130, 246, 0.1); bottom: 100px; left: -50px; }

        /* Custom NProgress */
        #nprogress .bar {
            background: linear-gradient(to right, #8b5cf6, #d946ef) !important;
            height: 3px !important;
        }
    </style>
</head>

<body class="bg-background-dark text-gray-100 transition-colors duration-300">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    {% include 'components/navbar.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'components/footer.html' %}

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Flask Flash Messages to JS Toasts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Jinja2 Flash messages injection
            const rawFlashMessages = `{% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    [
                    {% for category, message in messages %}
                        {"category": "{{ category }}", "message": "{{ message }}"}{{ "," if not loop.last else "" }}
                    {% endfor %}
                    ]
                {% else %}
                    []
                {% endif %}
            {% endwith %}`;

            let flashMessages = [];
            try {
                // If the template parsed successfully and populated the raw array string
                if (rawFlashMessages.trim().startsWith('[')) {
                    flashMessages = JSON.parse(rawFlashMessages);
                }
            } catch (e) {
                console.error("Error parsing flash messages", e);
            }

            flashMessages.forEach(msg => {
                showToast(msg.message, msg.category !== 'error' ? 'success' : 'error');
            });
        });

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            // Set basic toast classes
            toast.className = `toast toast-${type} flex items-center gap-3 bg-white dark:bg-[#1f1f22] text-gray-900 dark:text-white border border-gray-200 dark:border-white/10 shadow-xl rounded-xl px-4 py-3 transform transition-all duration-300 translate-x-full opacity-0`;

            // Icon based on type
            const icon = type === 'success' ? 'check_circle' : 'error';
            const iconColor = type === 'success' ? 'text-green-500' : 'text-red-500';

            toast.innerHTML = `
                <span class="material-symbols-outlined ${iconColor}">${icon}</span>
                <span class="font-medium text-sm">${message}</span>
            `;

            container.appendChild(toast);

            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
                toast.classList.add('translate-x-0', 'opacity-100');
            }, 10);

            // Animate out and remove after 3s
            setTimeout(() => {
                toast.classList.remove('translate-x-0', 'opacity-100');
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>

    <!-- Application Modal -->
    <div id="applicationModal" class="fixed inset-0 z-50 hidden" aria-labelledby="modal-title" role="dialog"
        aria-modal="true">
        <!-- Background backdrop -->
        <div class="fixed inset-0 bg-black bg-opacity-75 transition-opacity backdrop-blur-sm" onclick="toggleModal()">
        </div>

        <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
            <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
                <div
                    class="relative transform overflow-hidden rounded-2xl text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg">

                    <!-- Modern Glass Card -->
                    <div
                        class="bg-white/90 dark:bg-[#121214]/95 backdrop-blur-xl border border-white/20 dark:border-white/10 p-8 relative">
                        <!-- Close Button -->
                        <button onclick="toggleModal()" aria-label="Close modal"
                            class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors">
                            <span class="material-symbols-outlined">close</span>
                        </button>

                        <div class="text-center mb-8">
                            <div
                                class="mx-auto flex h-14 w-14 items-center justify-center rounded-full bg-primary/10 mb-4">
                                <span class="material-symbols-outlined text-primary text-2xl">rocket_launch</span>
                            </div>
                            <h3 class="text-2xl font-bold font-display text-gray-900 dark:text-white" id="modal-title">
                                Join the Ecosystem</h3>
                            <p class="text-sm text-gray-500 mt-2">Start your journey with stackeducation.</p>
                        </div>

                        <form onsubmit="handleContact(event)" class="space-y-5">
                            <div>
                                <label for="modal-name" class="block text-sm font-bold mb-1 text-gray-700 dark:text-gray-300">Full
                                    Name</label>
                                <input type="text" id="modal-name" required
                                    class="w-full px-4 py-3 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 text-gray-900 dark:text-white transition-all">
                            </div>

                            <div>
                                <label for="modal-email" class="block text-sm font-bold mb-1 text-gray-700 dark:text-gray-300">Email
                                    Address</label>
                                <input type="email" id="modal-email" required
                                    class="w-full px-4 py-3 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 text-gray-900 dark:text-white transition-all">
                            </div>

                            <div>
                                <label for="modal-interest" class="block text-sm font-bold mb-1 text-gray-700 dark:text-gray-300">Program
                                    Interest</label>
                                <select id="modal-interest"
                                    class="w-full px-4 py-3 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 text-gray-900 dark:text-white transition-all appearance-none cursor-pointer">
                                    <option>StackUp (Courses)</option>
                                    <option>StackLabs (Internships)</option>
                                    <option>StackBuild (Products)</option>
                                    <option>StackCommunity</option>
                                </select>
                            </div>

                            <button type="submit"
                                class="w-full bg-primary text-white font-bold py-3.5 rounded-xl hover:bg-primary/90 transition-all shadow-lg shadow-primary/25 mt-2">Submit
                                Application</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js" defer></script>
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    <script>
        // NProgress Initialization
        NProgress.configure({ showSpinner: false });
        window.addEventListener('beforeunload', () => NProgress.start());
        document.addEventListener('DOMContentLoaded', () => NProgress.done());
    </script>
    {% include 'components/chatbot.html' %}
</body>

</html>
